<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - BachelorPoint</title>
    <link rel="stylesheet" href="../assets/css/contact_us.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .contact-section {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .contact-section h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .contact-section form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-section input, .contact-section textarea, .contact-section button {
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 1em;
        }

        .contact-section textarea {
            resize: vertical;
            height: 150px;
        }

        .contact-section button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .contact-section button:hover {
            background-color: #45a049;
        }

        .team-section {
            margin-top: 40px;
            text-align: center;
        }

        .team-member {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            width: 250px;
            margin: 20px auto;
            display: inline-block;
        }

        .team-member img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .team-member h3 {
            margin-bottom: 5px;
            color: #007BFF;
        }

        .team-member p {
            font-size: 0.9em;
            color: #777;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }

        .social-icons {
            margin-top: 10px;
        }

        .social-icons img {
            width: 24px;
            margin: 0 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Contact Us - BachelorPoint</h1>
    </header>
    
    <nav>
        <a href="#">Home</a>
        <a href="properties.html">Properties</a>
        <a href="roommate_matching.html">Roommate Matching</a>
        <a href="about_us.html">About Us</a>
        <a href="contact_us.html">Contact Us</a>
    </nav>
    
    <section class="contact-section">
        <h2>Get in Touch</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <section class="team-section">
        <h2>Meet the Team</h2>
        <div class="team-member">
            <img src="../assets/images/team2.jpg" alt="Team Member">
            <h3>Jane Smith</h3>
            <p>Marketing Head</p>
        </div>
        <div class="team-member">
            <img src="../assets/images/team3.jpg" alt="Team Member">
            <h3>Michael Johnson</h3>
            <p>Operations Manager</p>
        </div>
        <div class="team-member">
            <img src="../assets/images/team4.jpg" alt="Team Member">
            <h3>Emily White</h3>
            <p>Customer Support Lead</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 BachelorPoint. All Rights Reserved.</p>
        <div class="social-icons">
            <a href="#"><img src="../assets/images/facebook-icon.png" alt="Facebook"></a>
            <a href="#"><img src="../assets/images/twitter-icon.png" alt="Twitter"></a>
            <a href="#"><img src="../assets/images/instagram-icon.png" alt="Instagram"></a>
        </div>
    </footer>
</body>
</html>
